<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUDOKU Game</title>
    <script defer src="./js/app.js"></script>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <header>
        <!-- Title -->
        <h1>SUDOKU</h1>
        <!-- New game & light/dark mode controllers -->
        <div id ="header-actions">
            <div id = "theme-btn" class="header-btn"></div>
            <div id = "new-game-btn" class="header-btn"></div>
        </div>

    </header>
    <main>
        <div id="game-panel">

            <div id="game-status">
               <div class="control-container">
                    <p class="control-label">Level</p>
                    <div>Easy</div>
               </div>
               <div id="mistakes-control" class="control-container">
                    <p class="control-label">Mistakes</p>
                    <div>
                         <img class="heart chance" src="./assets/images/Remaining-chance.png" alt="Remaining chance">
                         <img class="heart chance" src="./assets/images/Remaining-chance.png" alt="Remaining chance">
                         <img class="heart chance" src="./assets/images/Remaining-chance.png" alt="Remaining chance">
                    </div>
               </div>
               <div  class="control-container">
                    <p class="control-label">Time</p>
                    <div id="timer-control">
                         <p>00:00</p>
                         <img id="timer-btn" src="./assets/images/pause.png" alt="Pause button" data-status="playing">
                    </div>
               </div>
            </div>
            <div id="board-controls-container">
    
                <div id="board" class="box">
                            <div class="row" id="row-0">
                                 <div id="0-0" class="cell"></div>
                                 <div id="0-1" class="cell"></div>
                                 <div id="0-2" class="cell"></div>
                                 <div id="0-3" class="cell"></div>
                                 <div id="0-4" class="cell"></div>
                                 <div id="0-5" class="cell"></div>
                                 <div id="0-6" class="cell"></div>
                                 <div id="0-7" class="cell"></div>
                                 <div id="0-8" class="cell"></div>
                            </div>
                            <div class="row" id="row-1">
                                 <div id="1-0" class="cell"></div>
                                 <div id="1-1" class="cell"></div>
                                 <div id="1-2" class="cell"></div>
                                 <div id="1-3" class="cell"></div>
                                 <div id="1-4" class="cell"></div>
                                 <div id="1-5" class="cell"></div>
                                 <div id="1-6" class="cell"></div>
                                 <div id="1-7" class="cell"></div>
                                 <div id="1-8" class="cell"></div>
                            </div>
                            <div class="row" id="row-2">
                                 <div id="2-0" class="cell"></div>
                                 <div id="2-1" class="cell"></div>
                                 <div id="2-2" class="cell"></div>
                                 <div id="2-3" class="cell"></div>
                                 <div id="2-4" class="cell"></div>
                                 <div id="2-5" class="cell"></div>
                                 <div id="2-6" class="cell"></div>
                                 <div id="2-7" class="cell"></div>
                                 <div id="2-8" class="cell"></div>
                            </div>
                            <div class="row" id="row-3">
                                 <div id="3-0" class="cell"></div>
                                 <div id="3-1" class="cell"></div>
                                 <div id="3-2" class="cell"></div>
                                 <div id="3-3" class="cell"></div>
                                 <div id="3-4" class="cell"></div>
                                 <div id="3-5" class="cell"></div>
                                 <div id="3-6" class="cell"></div>
                                 <div id="3-7" class="cell"></div>
                                 <div id="3-8" class="cell"></div>
                            </div>
                            <div class="row" id="row-4">
                                 <div id="4-0" class="cell"></div>
                                 <div id="4-1" class="cell"></div>
                                 <div id="4-2" class="cell"></div>
                                 <div id="4-3" class="cell"></div>
                                 <div id="4-4" class="cell"></div>
                                 <div id="4-5" class="cell"></div>
                                 <div id="4-6" class="cell"></div>
                                 <div id="4-7" class="cell"></div>
                                 <div id="4-8" class="cell"></div>
                            </div>
                            <div class="row" id="row-5">
                                 <div id="5-0" class="cell"></div>
                                 <div id="5-1" class="cell"></div>
                                 <div id="5-2" class="cell"></div>
                                 <div id="5-3" class="cell"></div>
                                 <div id="5-4" class="cell"></div>
                                 <div id="5-5" class="cell"></div>
                                 <div id="5-6" class="cell"></div>
                                 <div id="5-7" class="cell"></div>
                                 <div id="5-8" class="cell"></div>
                            </div>
                            <div class="row" id="row-6">
                                 <div id="6-0" class="cell"></div>
                                 <div id="6-1" class="cell"></div>
                                 <div id="6-2" class="cell"></div>
                                 <div id="6-3" class="cell"></div>
                                 <div id="6-4" class="cell"></div>
                                 <div id="6-5" class="cell"></div>
                                 <div id="6-6" class="cell"></div>
                                 <div id="6-7" class="cell"></div>
                                 <div id="6-8" class="cell"></div>
                            </div>
                            <div class="row" id="row-7">
                                 <div id="7-0" class="cell"></div>
                                 <div id="7-1" class="cell"></div>
                                 <div id="7-2" class="cell"></div>
                                 <div id="7-3" class="cell"></div>
                                 <div id="7-4" class="cell"></div>
                                 <div id="7-5" class="cell"></div>
                                 <div id="7-6" class="cell"></div>
                                 <div id="7-7" class="cell"></div>
                                 <div id="7-8" class="cell"></div>
                            </div>
                            <div class="row" id="row-8">
                                 <div id="8-0" class="cell"></div>
                                 <div id="8-1" class="cell"></div>
                                 <div id="8-2" class="cell"></div>
                                 <div id="8-3" class="cell"></div>
                                 <div id="8-4" class="cell"></div>
                                 <div id="8-5" class="cell"></div>
                                 <div id="8-6" class="cell"></div>
                                 <div id="8-7" class="cell"></div>
                                 <div id="8-8" class="cell"></div>
                            </div>
                     </div>
                     <div id="game-controls">
                        <div>info</div>
     
                     </div>
            </div>
                 <div id="input-panel">
                    <div id="1" class="number-btn">1</div>
                    <div id="2" class="number-btn">2</div>
                    <div id="3" class="number-btn">3</div>
                    <div id="4" class="number-btn">4</div>
                    <div id="5" class="number-btn">5</div>
                    <div id="6" class="number-btn">6</div>
                    <div id="7" class="number-btn">7</div>
                    <div id="8" class="number-btn">8</div>
                    <div id="9" class="number-btn">9</div>                
                 </div>
        </div>
        <div id="popup-backdrop" class="hidden">
          <div id="popup">
               <div id="popup-header">
                    <img id="popup-img" class="pop-element" src="" alt="">
                    <h4 id="popup-header-message" class="pop-element">Message</h4>
               </div>
               
               <div id="popup-status" class="block pop-element">
                    <div class="control-container">
                         <p class="control-label">Difficulty</p>
                         <div id="popup-difficulty">Easy</div>
                    </div>
                    <div class="control-container">
                         <p class="control-label">Mistakes</p>
                         <div id="popup-mistakes">
                              <img class="heart" src="./assets/images/Remaining-chance.png" alt="Remaining chance">
                              <img class="heart" src="./assets/images/Remaining-chance.png" alt="Remaining chance">
                              <img class="heart" src="./assets/images/Remaining-chance.png" alt="Remaining chance">
                         </div>
                    </div>
                    <div  class="control-container ">
                         <p class="control-label">Time</p>
                         <div id="popup-time">00:00</div>
                    </div>
               </div>
               <div id="popup-message" class="pop-element">Messgae</div>
               <div id="popup-btns-container">
                    <button id="popup-primary-btn"class="pop-element popup-btn">Primary</button>
                    <button id="popup-secondary-btn" class="pop-element popup-btn block">Secondary</button>
               </div>
          </div>
    </main>
    
</body>
</html>
